// ── Prefix order (same as PDF) ─────────────────────────────────────────────
const PREFIX_ORDER = [
  "be-","ver-","er-","ent-","ab-","an-","auf-","aus-","mit-",
  "nach-","vor-","zurück-","zusammen-","weiter-","hin-/her-",
  "um-","ein-","durch-","los-","zu-","weg-","statt-"
];

// ── State ──────────────────────────────────────────────────────────────────
let activePrefix = "Alle";
let searchQuery  = "";

// ── Build pills ────────────────────────────────────────────────────────────
const pillsEl = document.getElementById("pills");
["Alle", ...PREFIX_ORDER].forEach(p => {
  const el = document.createElement("button");
  el.className = "pill" + (p === "Alle" ? " active" : "");
  el.dataset.p = p;
  el.textContent = p;
  el.addEventListener("click", () => {
    activePrefix = p;
    document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    render();
  });
  pillsEl.appendChild(el);
});

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// ── Highlight helper ───────────────────────────────────────────────────────
function hl(text, q) {
  if (!q) return escHtml(text);
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, "gi");
  return escHtml(text).replace(re, "<mark>$1</mark>");
}
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const tbody  = document.getElementById("tbody");
  const emptyEl= document.getElementById("empty");
  const counterEl = document.getElementById("counter");

  const filtered = DATA.filter(([verb, prefix, bed, ex]) => {
    const matchPrefix = activePrefix === "Alle" || prefix === activePrefix;
    const q = searchQuery;
    const matchSearch = !q ||
      verb.toLowerCase().includes(q)   ||
      prefix.toLowerCase().includes(q) ||
      bed.toLowerCase().includes(q)    ||
      ex.toLowerCase().includes(q);
    return matchPrefix && matchSearch;
  });

  counterEl.textContent = `${filtered.length} verbo${filtered.length !== 1 ? "s" : ""}`;

  if (filtered.length === 0) {
    tbody.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";

  // Group by prefix (keeping PDF order)
  const groups = {};
  filtered.forEach(row => {
    const p = row[1];
    if (!groups[p]) groups[p] = [];
    groups[p].push(row);
  });

  const orderedPrefixes = PREFIX_ORDER.filter(p => groups[p]);

  let html = "";
  orderedPrefixes.forEach(prefix => {
    // Only show section header when showing all prefixes
    if (activePrefix === "Alle") {
      const color = PREFIX_COLORS[prefix] || "#888";
      html += `<tr class="section-row"><td colspan="4" style="color:${color}">Prefijo ${prefix}</td></tr>`;
    }
    groups[prefix].forEach(([verb, pref, bed, ex]) => {
      const color  = PREFIX_COLORS[pref] || "#888";
      const bg     = color + "22";
      html += `
        <tr>
          <td class="verb">${hl(verb, searchQuery)}</td>
          <td>
            <span class="badge" style="background:${bg};color:${color}">
              ${hl(pref, searchQuery)}
            </span>
          </td>
          <td class="bed">${hl(bed, searchQuery)}</td>
          <td class="ex">${hl(ex, searchQuery)}</td>
        </tr>`;
    });
  });

  tbody.innerHTML = html;
}

render();
</script>
